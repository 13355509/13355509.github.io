<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
        body{min-height:100vh;background:#121212;color:#fff;display:grid;place-items:center;padding:20px}
        .card{background:#1e1e1e;padding:40px;border-radius:24px;max-width:420px;width:100%;text-align:center;box-shadow:0 0 40px #0006}
        .avatar{width:130px;height:130px;border-radius:50%;object-fit:cover;border:4px solid #4285f4;margin-bottom:20px}
        h1{font-size:28px;margin-bottom:10px}
        .bio{color:#aaa;margin-bottom:30px;line-height:1.6}
        .links{display:flex;flex-direction:column;gap:12px}
        .btn{display:block;padding:14px;background:#2a2a2a;color:#fff;text-decoration:none;border-radius:12px;transition:.2s}
        .btn:hover{background:#4285f4;transform:translateY(-2px)}
    </style>
</head>
<body>
<div class="card">
    <img class="avatar" src="https://picsum.photos/id/177/200/200" alt="头像">
    <h1>你的名字</h1>
    <p class="bio">热爱编程与分享<br>简单干净的个人主页</p>
    <div class="links">
        <a href="blog.html" class="btn">我的博客</a>
        <a href="#" class="btn">GitHub</a>
        <a href="#" class="btn">邮箱</a>
        <a href="#" class="btn">项目</a>
    </div>
</div>
</body>
</html>
